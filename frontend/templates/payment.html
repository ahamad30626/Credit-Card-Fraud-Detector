<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a53d0;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --input-bg: #0f172a;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.2) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 0.2) 0, transparent 50%);
        }

        .checkout-container {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Order Summary Section */
        .order-summary {
            padding: 40px;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.8) 100%);
            border-right: 1px solid var(--border-color);
        }

        .summary-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .order-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .item-img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 500;
            margin-bottom: 5px;
        }

        .item-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .item-price {
            font-weight: 600;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-main);
        }

        /* Payment Details Section */
        .payment-details {
            padding: 40px;
        }

        .payment-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .payment-methods {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .method-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
        }

        .method-btn.active {
            border-color: var(--primary);
            background: rgba(67, 97, 238, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
        }

        .form-control::placeholder {
            color: #475569;
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 38px;
            color: var(--text-muted);
        }

        .pay-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .pay-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(67, 97, 238, 0.5);
        }

        .pay-btn:active {
            transform: translateY(0);
        }

        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Credit Card Visual */
        .card-visual {
            width: 100%;
            height: 180px;
            border-radius: 16px;
            background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            margin-bottom: 30px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px -10px rgba(67, 97, 238, 0.4);
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
        }

        .card-visual::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            transform: rotate(30deg);
            pointer-events: none;
        }

        .card-chip {
            width: 45px;
            height: 35px;
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
            border-radius: 6px;
            margin-bottom: 30px;
            position: relative;
        }

        .card-chip::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .card-number-display {
            font-size: 1.25rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-family: monospace;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .card-info-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-info-label {
            font-size: 0.6rem;
            opacity: 0.8;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>

    <div class="checkout-container">

        <!-- Payment Details -->
        <div class="payment-details">
            <h2 class="payment-title">Payment Details</h2>

            <div class="payment-methods">
                <button class="method-btn active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                        <line x1="1" y1="10" x2="23" y2="10"></line>
                    </svg>
                    Card
                </button>
            </div>

            <div class="card-visual" id="cardVisual">
                <div class="card-chip"></div>
                <div class="card-number-display" id="cardNumberDisplay">•••• •••• •••• ••••</div>
                <div class="card-info-display">
                    <div>
                        <div class="card-info-label">Card Holder</div>
                        <div id="cardNameDisplay">YOUR NAME</div>
                    </div>
                    <div>
                        <div class="card-info-label">Expires</div>
                        <div id="cardExpiryDisplay">MM/YY</div>
                    </div>
                </div>
            </div>

            <form id="paymentForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Payer IP Address (Auto-detected)</label>
                    <input type="text" class="form-control" id="payerIp" placeholder="Fetching IP..." required>
                </div>

                <div class="form-group">
                    <label class="form-label">Card Number</label>
                    <input type="text" class="form-control" id="cardNumber" placeholder="0000 0000 0000 0000"
                        maxlength="19" required>
                    <svg class="input-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                        <line x1="1" y1="10" x2="23" y2="10"></line>
                    </svg>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Expiry Date</label>
                        <input type="text" class="form-control" id="cardExpiry" placeholder="MM/YY" maxlength="5"
                            required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">CVC</label>
                        <input type="text" class="form-control" id="cardCvc" placeholder="123" maxlength="4" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Name on Card</label>
                    <input type="text" class="form-control" id="cardName" placeholder="John Doe" required>
                </div>

                <button type="submit" class="pay-btn">Pay</button>

                <div class="secure-badge">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Payments are secure and encrypted
                </div>
            </form>
        </div>

    </div>

    <script>
        // Formatting function for Card Number
        const cardNumberInput = document.getElementById('cardNumber');
        const cardExpiryInput = document.getElementById('cardExpiry');
        const cardCvcInput = document.getElementById('cardCvc');
        const cardNameInput = document.getElementById('cardName');
        const form = document.getElementById('paymentForm');

        const cardNumberDisplay = document.getElementById('cardNumberDisplay');
        const cardExpiryDisplay = document.getElementById('cardExpiryDisplay');
        const cardNameDisplay = document.getElementById('cardNameDisplay');

        cardNumberInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            let formattedValue = '';

            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) {
                    formattedValue += ' ';
                }
                formattedValue += value[i];
            }

            e.target.value = formattedValue;

            // Update display
            let displayVal = formattedValue;
            if (displayVal === '') displayVal = '•••• •••• •••• ••••';
            cardNumberDisplay.textContent = displayVal;
        });

        cardExpiryInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');

            if (value.length > 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }

            e.target.value = value;

            // Update display
            cardExpiryDisplay.textContent = value || 'MM/YY';
        });

        cardCvcInput.addEventListener('input', function (e) {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        cardNameInput.addEventListener('input', function (e) {
            cardNameDisplay.textContent = e.target.value.toUpperCase() || 'YOUR NAME';
        });

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = document.querySelector('.pay-btn');
            const originalText = btn.textContent;

            btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="spin" style="animation: spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';

            setTimeout(() => {
                btn.innerHTML = 'Payment Successful ✓';
                btn.style.background = 'var(--success)';

                const cardVal = document.getElementById('cardNumber').value.replace(/\s+/g, '');
                const nameVal = document.getElementById('cardName').value;
                const cvcVal = document.getElementById('cardCvc').value;
                const ipVal = document.getElementById('payerIp').value;

                setTimeout(() => {
                    window.location.href = `/analysis?autofill=true&card=${encodeURIComponent(cardVal)}&name=${encodeURIComponent(nameVal)}&cvc=${encodeURIComponent(cvcVal)}&ip=${encodeURIComponent(ipVal)}`;
                }, 1000); // 1 second redirection
            }, 1000);
        });

        // Add keyframes for spinner
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);

        // Fetch user IP address dynamically for realism
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => {
                const ipInput = document.getElementById('payerIp');
                if (ipInput) ipInput.value = data.ip;
            })
            .catch(err => {
                console.warn('Could not fetch IP automatically. Using default fallback.');
                const ipInput = document.getElementById('payerIp');
                if (ipInput) ipInput.value = '192.168.1.100';
            });
    </script>
</body>

</html>
